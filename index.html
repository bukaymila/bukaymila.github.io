<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cold box Apps | By Alim Yakub (RP)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
    <text y=%22.9em%22 font-size=%2290%22>🥶</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Make everything full screen, no scrolling by default */
        html, body {
            height: 100%;
            overflow: hidden; /* Prevents scrolling */
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header area - compact but visible */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f0f9ff, #bae6fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .subhead {
            color: #94a3b8;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            margin-top: 0.25rem;
        }

        /* Grid: exactly 4 columns, fills available space */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Fixed 4 columns */
            gap: 1.5rem;
            flex: 1;
            min-height: 0; /* Allows grid to shrink properly */
        }

        /* GIANT BUTTON CARD - fills entire grid cell */
        .tool-card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            height: 100%; /* Fills entire grid cell height */
        }

        .tool-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 35px 50px -15px rgba(0, 0, 0, 0.5);
        }

        /* Visual area - grows to fill space */
        .visual-area {
            flex: 3;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Individual gradient backgrounds */
        .visual-area[data-tool="line-chart"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .visual-area[data-tool="u07b-extract"] {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .visual-area[data-tool="csv-edit"] {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .visual-area[data-tool="stl-viewer"] {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        /* Giant responsive icon */
        .giant-icon {
            font-size: clamp(3rem, 12vw, 8rem);
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .tool-card:hover .giant-icon {
            transform: scale(1.1) rotate(5deg);
        }

        /* Decorative animation */
        .visual-area::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
            top: -50%;
            left: -50%;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .tool-card:hover .visual-area::before {
            opacity: 1;
        }

        /* Content area with title - compact but readable */
        .card-content {
            flex: 1;
            padding: 1.25rem 1rem 1.5rem;
            text-align: center;
            background: white;
            border-top: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tool-title {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #0f172a;
            line-height: 1.3;
        }

        .tool-url {
            font-size: clamp(0.7rem, 1.5vw, 0.8rem);
            color: #64748b;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 0.75rem;
        }

        .launch-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #0f172a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: clamp(0.75rem, 1.8vw, 0.85rem);
            transition: all 0.2s;
            width: fit-content;
            margin: 0 auto;
        }

        .tool-card:hover .launch-badge {
            background: #1e293b;
            gap: 0.8rem;
            padding: 0.5rem 1.2rem;
        }

        .launch-badge::after {
            content: '→';
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .tool-card:hover .launch-badge::after {
            transform: translateX(4px);
        }

        /* For screens smaller than 1000px, reduce gap slightly */
        @media (max-width: 1000px) {
            .grid {
                gap: 1rem;
            }
        }

        /* For screens smaller than 800px, keep 4 columns but smaller text */
        @media (max-width: 800px) {
            .grid {
                gap: 0.8rem;
            }
            .card-content {
                padding: 0.8rem 0.8rem 1rem;
            }
            .launch-badge {
                padding: 0.35rem 0.8rem;
            }
        }

        /* For very small screens (phones), still 4 columns but ultra compact */
        @media (max-width: 600px) {
            body {
                padding: 0.5rem;
            }
            .grid {
                gap: 0.5rem;
            }
            .card-content {
                padding: 0.6rem 0.4rem 0.8rem;
            }
            .tool-title {
                margin-bottom: 0.25rem;
            }
            .tool-url {
                margin-bottom: 0.4rem;
            }
        }

        /* If more than 4 tools are added, scrolling becomes available */
        @media (min-height: 1200px) {
            body {
                overflow: auto;
            }
            html {
                overflow: auto;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ COLD BOX LAUNCHPAD</h1>
        <div class="subhead">cold box stuff · alim yakub (rp)</div>
    </div>

    <div class="grid">
        <!-- Line Chart -->
        <a href="https://bukaymila.github.io/line-chart" target="_blank" rel="noopener noreferrer" class="tool-card">
            <div class="visual-area" data-tool="line-chart">
                <div class="giant-icon">📈</div>
            </div>
            <div class="card-content">
                <div class="tool-title">🎨 Line Chart Studio</div>
                <div class="tool-url">bukaymila.github.io/line-chart</div>
                <div class="launch-badge">Launch</div>
            </div>
        </a>

        <!-- U07B Extractor -->
        <a href="https://bukaymila.github.io/U07B-extract" target="_blank" rel="noopener noreferrer" class="tool-card">
            <div class="visual-area" data-tool="u07b-extract">
                <div class="giant-icon">🌡️</div>
            </div>
            <div class="card-content">
                <div class="tool-title">🌡️ U07B Extractor</div>
                <div class="tool-url">bukaymila.github.io/U07B-extract</div>
                <div class="launch-badge">Launch</div>
            </div>
        </a>

        <!-- CSV Processor -->
        <a href="https://bukaymila.github.io/csv-edit" target="_blank" rel="noopener noreferrer" class="tool-card">
            <div class="visual-area" data-tool="csv-edit">
                <div class="giant-icon">📊</div>
            </div>
            <div class="card-content">
                <div class="tool-title">📊 CSV Processor</div>
                <div class="tool-url">bukaymila.github.io/csv-edit</div>
                <div class="launch-badge">Launch</div>
            </div>
        </a>

        <!-- STL Viewer -->
        <a href="https://bukaymila.github.io/stl-viewer" target="_blank" rel="noopener noreferrer" class="tool-card">
            <div class="visual-area" data-tool="stl-viewer">
                <div class="giant-icon">🔷</div>
            </div>
            <div class="card-content">
                <div class="tool-title">🧊 STL 3D Viewer</div>
                <div class="tool-url">bukaymila.github.io/stl-viewer</div>
                <div class="launch-badge">Launch</div>
            </div>
        </a>
    </div>
</div>
</body>
</html>
